# ─────────────────────────────────────────────────────────────────────────────
# Paperclip AI — Render Blueprint for Deeply Brain control plane
# Deploy: Connect this repo in Render dashboard → "New Blueprint Instance"
# ─────────────────────────────────────────────────────────────────────────────

databases:
  - name: paperclip-db
    plan: basic-256mb
    databaseName: paperclip
    user: paperclip

services:
  - type: web
    name: paperclip
    runtime: docker
    dockerfilePath: ./Dockerfile
    autoDeploy: false
    plan: starter

    # Persistent storage for config, secrets, workspaces, backups
    disk:
      name: paperclip-data
      mountPath: /paperclip
      sizeGB: 5

    # Health check — /api/health returns 200 when DB is reachable
    healthCheckPath: /api/health

    envVars:
      # ── Database ──────────────────────────────────────────────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: paperclip-db
          property: connectionString

      # ── Auth ──────────────────────────────────────────────────────────────
      # Required: random secret for session signing
      # Generate: openssl rand -hex 32
      - key: BETTER_AUTH_SECRET
        sync: false

      # Public URL of this service — used for auth redirects + allowed hostnames
      # Set to: https://paperclip-m2ko.onrender.com  (your Render URL)
      - key: PAPERCLIP_PUBLIC_URL
        value: https://paperclip-m2ko.onrender.com

      # explicit mode is auto-enabled when PAPERCLIP_PUBLIC_URL is set
      # DO NOT set PAPERCLIP_AUTH_BASE_URL_MODE manually — let it auto-resolve

      # ── Deployment ────────────────────────────────────────────────────────
      - key: PAPERCLIP_DEPLOYMENT_MODE
        value: authenticated
      - key: PAPERCLIP_DEPLOYMENT_EXPOSURE
        value: public

      # ── Server ────────────────────────────────────────────────────────────
      - key: HOST
        value: "0.0.0.0"
      - key: SERVE_UI
        value: "true"
      - key: NODE_ENV
        value: production

      # ── Sign-up ───────────────────────────────────────────────────────────
      # false = allow sign-up (needed for first admin account creation)
      - key: PAPERCLIP_AUTH_DISABLE_SIGN_UP
        value: "false"

      # ── Optional: Anthropic key ───────────────────────────────────────────
      - key: ANTHROPIC_API_KEY
        sync: false

      # ── Backups ───────────────────────────────────────────────────────────
      - key: PAPERCLIP_DB_BACKUP_ENABLED
        value: "true"
      - key: PAPERCLIP_DB_BACKUP_INTERVAL_MINUTES
        value: "60"
      - key: PAPERCLIP_DB_BACKUP_RETENTION_DAYS
        value: "30"
